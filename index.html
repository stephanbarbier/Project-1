<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera App with Image Recognition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Camera App with Image Recognition</h1>
        
        <div id="statusMessage" class="status hidden"></div>
        <div id="errorMessage" class="error hidden"></div>
        
        <div id="videoContainer">
            <video id="video" autoplay playsinline muted></video>
        </div>
        
        <canvas id="canvas"></canvas>
        
        <div class="controls">
            <button id="startButton">Start Camera</button>
            <button id="captureButton" disabled>Capture Photo</button>
            <button id="analyzeButton" class="hidden">Analyze Image</button>
            <button id="manualAnalyzeButton" class="hidden">Manual Analysis</button>
            <button id="downloadButton" class="hidden">Download Photo</button>
            <button id="resetButton" class="hidden">Take Another</button>
        </div>
        
        <img id="photo" alt="Captured photo will appear here">
        
        <div id="recognitionContainer" class="recognition-container hidden">
            <h2>Image Recognition Results</h2>
            <div id="results"></div>
        </div>
    </div>

    <script>
        // DOM elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photo = document.getElementById('photo');
        const startButton = document.getElementById('startButton');
        const captureButton = document.getElementById('captureButton');
        const analyzeButton = document.getElementById('analyzeButton');
        const manualAnalyzeButton = document.getElementById('manualAnalyzeButton');
        const downloadButton = document.getElementById('downloadButton');
        const resetButton = document.getElementById('resetButton');
        const errorMessage = document.getElementById('errorMessage');
        const statusMessage = document.getElementById('statusMessage');
        const recognitionContainer = document.getElementById('recognitionContainer');
        const resultsContainer = document.getElementById('results');
        
        // Hugging Face API settings
const API_URL = "https://hf.space/embed/your-demo-api/run/predict";
        const HF_API_TOKEN = ""; // Add your token here if you have one
        
        let stream = null;
        let capturedImageData = null;
        
        // Show status message
        function showStatus(message, type = 'loading') {
            statusMessage.textContent = message;
            statusMessage.className = `status ${type}`;
            statusMessage.classList.remove('hidden');
        }
        
        // Hide status message
        function hideStatus() {
            statusMessage.classList.add('hidden');
        }
        
        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
            hideStatus();
        }
        
        // Hide error message
        function hideError() {
            errorMessage.classList.add('hidden');
        }
        
        // Start camera
        startButton.addEventListener('click', async () => {
            hideError();
            showStatus('Accessing camera...');
            
            try {
                // Try different constraints for better compatibility
                const constraints = {
                    video: {
                        facingMode: { ideal: "environment" }, // Prefer rear camera
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // Set video source
                video.srcObject = stream;
                
                // Update UI
                hideStatus();
                showStatus('Camera ready!', 'success');
                startButton.disabled = true;
                captureButton.disabled = false;
                
                // Hide any previous photo and results
                photo.style.display = 'none';
                downloadButton.classList.add('hidden');
                analyzeButton.classList.add('hidden');
                manualAnalyzeButton.classList.add('hidden');
                resetButton.classList.add('hidden');
                recognitionContainer.classList.add('hidden');
                
            } catch (err) {
                console.error("Error accessing camera:", err);
                let errorMsg = 'Error accessing camera: ';
                
                if (err.name === 'NotAllowedError') {
                    errorMsg += 'Permission denied. Please allow camera access.';
                } else if (err.name === 'NotFoundError' || err.name === 'OverconstrainedError') {
                    errorMsg += 'No camera found or camera not supported.';
                } else if (err.name === 'NotReadableError') {
                    errorMsg += 'Camera is already in use.';
                } else {
                    errorMsg += err.message || 'Unknown error occurred.';
                }
                
                showError(errorMsg);
                hideStatus();
            }
        });
        
        // Capture photo
        captureButton.addEventListener('click', () => {
            if (!stream) return;
            
            // Set canvas dimensions to match video
            canvas.width = video.videoWidth || video.offsetWidth;
            canvas.height = video.videoHeight || video.offsetHeight;
            
            // Draw current video frame to canvas
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert to image and display
            capturedImageData = canvas.toDataURL('image/png');
            photo.src = capturedImageData;
            photo.style.display = 'block';
            
            // Update UI
            captureButton.disabled = true;
            analyzeButton.classList.remove('hidden');
            manualAnalyzeButton.classList.remove('hidden');
            downloadButton.classList.remove('hidden');
            resetButton.classList.remove('hidden');
            hideStatus();
        });
        
        // Auto-analyze image using Hugging Face API
        analyzeButton.addEventListener('click', async () => {
            await analyzeImage();
        });
        
        // Manual analysis button
        manualAnalyzeButton.addEventListener('click', async () => {
            await analyzeImage();
        });
        
        // Analyze image using Hugging Face API
        async function analyzeImage() {
            if (!capturedImageData) return;
            
            // Check if API token is provided
            if (!HF_API_TOKEN) {
                showError("Hugging Face API token required. Please add your token to use image recognition.");
                return;
            }
            
            showStatus('Analyzing image...');
            analyzeButton.disabled = true;
            manualAnalyzeButton.disabled = true;
            
            try {
                // Convert data URL to blob
                const response = await fetch(capturedImageData);
                const blob = await response.blob();
                
                // Call Hugging Face API
                const apiResponse = await fetch(HF_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${HF_API_TOKEN}`,
                        'Content-Type': 'application/octet-stream'
                    },
                    body: blob
                });
                
                if (!apiResponse.ok) {
                    const errorText = await apiResponse.text();
                    throw new Error(`API request failed: ${apiResponse.status} - ${errorText}`);
                }
                
                const results = await apiResponse.json();
                
                // Display results
                displayResults(results);
                hideStatus();
                
            } catch (error) {
                console.error('Error analyzing image:', error);
                showError(`Image analysis failed: ${error.message}`);
                analyzeButton.disabled = false;
                manualAnalyzeButton.disabled = false;
            }
        }
        
        // Display recognition results
        function displayResults(results) {
            // Check if results is an array or object with predictions
            let predictions = [];
            
            if (Array.isArray(results)) {
                predictions = results;
            } else if (results && typeof results === 'object') {
                // Handle different API response formats
                if (results.predictions) {
                    predictions = results.predictions;
                } else if (results[0] && results[0].label) {
                    predictions = results;
                } else {
                    // Try to find predictions in the object
                    for (const key in results) {
                        if (Array.isArray(results[key])) {
                            predictions = results[key];
                            break;
                        }
                    }
                }
            }
            
            if (!predictions || predictions.length === 0) {
                resultsContainer.innerHTML = '<p>No recognizable objects found</p>';
                recognitionContainer.classList.remove('hidden');
                return;
            }
            
            // Sort results by confidence if available
            if (predictions[0].score !== undefined) {
                predictions.sort((a, b) => b.score - a.score);
            }
            
            // Create HTML for results
            let html = '<div class="results-list">';
            predictions.slice(0, 5).forEach(prediction => {
                const label = prediction.label || prediction.class || 'Unknown';
                const confidence = prediction.score !== undefined 
                    ? (prediction.score * 100).toFixed(1)
                    : 'N/A';
                    
                html += `
                    <div class="prediction-item">
                        <span class="prediction-label">${label}</span>
                        <span class="prediction-confidence">${confidence}%</span>
                    </div>
                `;
            });
            html += '</div>';
            
            resultsContainer.innerHTML = html;
            recognitionContainer.classList.remove('hidden');
        }
        
        // Download photo
        downloadButton.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'camera-photo.png';
            link.href = photo.src;
            link.click();
        });
        
        // Reset for another photo
        resetButton.addEventListener('click', () => {
            photo.style.display = 'none';
            downloadButton.classList.add('hidden');
            analyzeButton.classList.add('hidden');
            manualAnalyzeButton.classList.add('hidden');
            resetButton.classList.add('hidden');
            recognitionContainer.classList.add('hidden');
            captureButton.disabled = false;
            analyzeButton.disabled = false;
            manualAnalyzeButton.disabled = false;
        });
        
        // Stop camera function
        function stopCamera() {
            if (stream) {
                const tracks = stream.getTracks();
                tracks.forEach(track => track.stop());
                stream = null;
            }
        }
        
        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            stopCamera();
        });
        
        // Handle video play errors
        video.addEventListener('error', (e) => {
            showError('Error playing video stream: ' + e.message);
        });
        
        // Handle video metadata load
        video.addEventListener('loadedmetadata', () => {
            console.log('Video metadata loaded');
        });
    </script>
</body>
</html>
